<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <meta name="description" content="Заметки про AI-модели и генерацию картинок.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="header">
      <nav class="nav" aria-label="Main" data-site-nav data-nav-mode="home"></nav>
    </header>

    <section class="hero">
      <h1 class="hero-title">Some—one.</h1>
      <p class="hero-desc">Пишу про AI. Разбираю модели и делюсь тем, что нашёл.</p>
      <a class="hero-cta" href="https://t.me/aveline_ai" target="_blank" rel="noreferrer noopener">
        <span>Читать канал</span>
        <svg viewBox="0 0 20 20" width="15" height="15" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clip-rule="evenodd"/>
        </svg>
      </a>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Статьи</h2>
        <span class="section-count" data-articles-count>0</span>
      </div>

      <div class="cards" data-articles-list></div>
    </section>

    <section class="section">
      <h2 class="section-title">Где меня читать</h2>
      <div class="links-grid">
        <a class="link-tile" href="https://t.me/aveline_ai" target="_blank" rel="noreferrer noopener">
          <div class="link-tile-text">
            <span class="link-tile-label">Канал</span>
            <span class="link-tile-name">Some—one</span>
            <span class="link-tile-handle">t.me/aveline_ai</span>
          </div>
          <span class="link-tile-cta">
            <span class="link-tile-cta-label">Открыть</span>
            <svg class="card-cta-icon" viewBox="0 0 20 20" width="15" height="15" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clip-rule="evenodd"/>
            </svg>
          </span>
        </a>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-row">
        <span>© Some—one</span>
        <div class="footer-links">
          <a href="https://t.me/aveline_ai" target="_blank" rel="noreferrer noopener">Telegram</a>
        </div>
      </div>
    </footer>
  </main>
  <script src="articles-data.js"></script>
  <script src="site.js"></script>
</body>
</html>
